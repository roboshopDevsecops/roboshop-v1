---
- name: Install Node.js repository
  ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/yum.repos.d/nodesource.repo

- name: Install Node.js
  ansible.builtin.dnf:
    name: nodejs
    state: present

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Wait for Valkey
  ansible.builtin.include_role:
    name: common
    tasks_from: wait-for-valkey

- name: Deploy cart service artifact
  ansible.builtin.include_role:
    name: common
    tasks_from: deploy-artifact
  vars:
    artifact_zip: cart.zip

- name: Install Node.js dependencies
  ansible.builtin.shell: npm install --production
  args:
    chdir: /app

- name: Set cart service ownership
  ansible.builtin.include_role:
    name: common
    tasks_from: app-permissions

- name: Install cart systemd unit
  ansible.builtin.template:
    src: cart.service.j2
    dest: /etc/systemd/system/cart.service

- name: Start cart service
  ansible.builtin.systemd_service:
    name: cart
    daemon_reload: true
    enabled: true
    state: started
