---
- name: Install Go toolchain
  ansible.builtin.dnf:
    name:
      - golang
      - git
      - "{{ mysql_client_package }}"
    state: present

- name: Deploy catalogue artifact
  ansible.builtin.include_role:
    name: common
    tasks_from: deploy-artifact
  vars:
    artifact_zip: catalogue.zip

- name: Wait for MySQL
  ansible.builtin.include_role:
    name: common
    tasks_from: wait-for-mysql

- name: Initialize catalogue database
  ansible.builtin.shell: |
    mysql -h {{ mysql_host }} -u root -pRoboShop@1 < db/schema.sql
    mysql -h {{ mysql_host }} -u root -pRoboShop@1 < db/app-user.sql
    mysql -h {{ mysql_host }} -u root -pRoboShop@1 catalogue < db/master-data.sql
  args:
    chdir: /app

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Build catalogue binary
  ansible.builtin.shell: go mod tidy && CGO_ENABLED=0 go build -o /app/catalogue .
  args:
    chdir: /app

- name: Set catalogue ownership
  ansible.builtin.include_role:
    name: common
    tasks_from: app-permissions

- name: Install catalogue systemd unit
  ansible.builtin.template:
    src: catalogue.service.j2
    dest: /etc/systemd/system/catalogue.service

- name: Start catalogue service
  ansible.builtin.systemd_service:
    name: catalogue
    daemon_reload: true
    enabled: true
    state: started