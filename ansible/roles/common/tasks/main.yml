---
- name: Detect OS-specific package names
  ansible.builtin.include_tasks: os-packages.yml

- name: Disable SELinux enforcement
  ansible.builtin.command: setenforce 0
  changed_when: true
  failed_when: false

- name: Stop and disable firewalld
  ansible.builtin.systemd_service:
    name: firewalld
    state: stopped
    enabled: false
