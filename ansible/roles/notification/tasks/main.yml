---
- name: Install Python
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
    state: present

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Deploy notification artifact
  ansible.builtin.include_role:
    name: common
    tasks_from: deploy-artifact
  vars:
    artifact_zip: notification.zip

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /app/requirements.txt
    executable: pip3

- name: Set notification ownership
  ansible.builtin.include_role:
    name: common
    tasks_from: app-permissions

- name: Install notification systemd unit
  ansible.builtin.template:
    src: notification.service.j2
    dest: /etc/systemd/system/notification.service

- name: Start notification service
  ansible.builtin.systemd_service:
    name: notification
    daemon_reload: true
    enabled: true
    state: started
