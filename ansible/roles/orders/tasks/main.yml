---
- name: Install Java and Maven
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - java-21-openjdk-devel
      - maven
    state: present

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Wait for MongoDB
  ansible.builtin.include_role:
    name: common
    tasks_from: wait-for-mongodb

- name: Wait for RabbitMQ
  ansible.builtin.include_role:
    name: common
    tasks_from: wait-for-rabbitmq

- name: Deploy orders artifact
  ansible.builtin.include_role:
    name: common
    tasks_from: deploy-artifact
  vars:
    artifact_zip: orders.zip

- name: Build orders jar
  ansible.builtin.shell: mvn clean package -DskipTests && cp target/orders.jar /app/orders.jar
  args:
    chdir: /app

- name: Set orders ownership
  ansible.builtin.include_role:
    name: common
    tasks_from: app-permissions

- name: Install orders systemd unit
  ansible.builtin.template:
    src: orders.service.j2
    dest: /etc/systemd/system/orders.service

- name: Start orders service
  ansible.builtin.systemd_service:
    name: orders
    daemon_reload: true
    enabled: true
    state: started
