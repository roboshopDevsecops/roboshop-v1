---
- name: Install Python
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
    state: present

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Download payment artifact
  ansible.builtin.get_url:
    url: "{{ artifact_base_url }}/payment.zip"
    dest: /tmp/payment.zip

- name: Extract payment application
  ansible.builtin.unarchive:
    src: /tmp/payment.zip
    dest: /app
    remote_src: true

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /app/requirements.txt
    executable: pip3

- name: Install payment systemd unit
  ansible.builtin.template:
    src: payment.service.j2
    dest: /etc/systemd/system/payment.service

- name: Start payment service
  ansible.builtin.systemd_service:
    name: payment
    daemon_reload: true
    enabled: true
    state: started
