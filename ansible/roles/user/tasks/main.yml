---
- name: Install Node.js repository
  ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/yum.repos.d/nodesource.repo

- name: Install Node.js
  ansible.builtin.dnf:
    name: nodejs
    state: present

- name: Create appuser
  ansible.builtin.user:
    name: appuser
    system: true
    shell: /bin/false

- name: Wait for MongoDB
  ansible.builtin.include_role:
    name: common
    tasks_from: wait-for-mongodb

- name: Deploy user service artifact
  ansible.builtin.include_role:
    name: common
    tasks_from: deploy-artifact
  vars:
    artifact_zip: user.zip

- name: Install Node.js dependencies
  ansible.builtin.shell: npm install --production
  args:
    chdir: /app

- name: Set user service ownership
  ansible.builtin.include_role:
    name: common
    tasks_from: app-permissions

- name: Install user systemd unit
  ansible.builtin.template:
    src: user.service.j2
    dest: /etc/systemd/system/user.service

- name: Start user service
  ansible.builtin.systemd_service:
    name: user
    daemon_reload: true
    enabled: true
    state: started
